<form action="" method="POST" enctype="multipart/form-data">

  <div class="form-group">
    <label for="modelFile">Select Model</label>
    <input type="file" class="form-control-file" id="modelFile" name="modelFile">
  </div>

  <div class="form-group">
    <label for="modelName">Model Name</label>
    <input type="text" class="form-control" id="modelName" name="modelName" placeholder="My new model">
  </div>

  <div class="form-group">
    <input type="submit" class="btn btn-primary" name="createModel" value="Create" />
  </div>

  <script>
    const modelFile = document.querySelector('input#modelFile');
    const modelName = document.querySelector('input#modelName');

    modelFile.addEventListener("change", function() {
      const files = modelFile.files;

      if (files.length >= 1) {
        const fileName = files[0].name;
        const name = fileName.substr(0, fileName.lastIndexOf('.')) || fileName;

        modelName.value = name;
      }
    });
  </script>
</form>
