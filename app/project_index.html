<div class="row">
  <div class="col-md-9">

    <div class="mb-2 mb-md-0 pt-3 pb-2 mb-3 d-flex justify-content-between">

      <div class="btn-toolbar">
        <div class="input-group input-group-sm mr-2">
          <input type="text" class="form-control" placeholder="filter..." id="filter-name">
        </div>

        <div class="btn-group btn-group-toggle mr-2" data-toggle="buttons">
          <label class="btn btn-sm btn-outline-secondary">
            <input type="radio" name="filter-inventory" value="all"> All
          </label>
          <label class="btn btn-sm btn-outline-secondary">
            <input type="radio" name="filter-inventory" value="needed"> Needed
          </label>
          <label class="btn btn-sm btn-outline-secondary">
            <input type="radio" name="filter-inventory" value="owned"> Owned
          </label>
        </div>

        <div class="input-group input-group-sm mr-2">
          <select class="custom-select" id="filter-colour">
            <option value="none">Any Colour</option>
            {{ range .Project.Colours }}
              <option value="{{ .ID }}">{{ .Name }}</option>
            {{ end }}
          </select>
        </div>
      </div>

      <form method="POST">
        <a class="btn btn-sm btn-outline-secondary" href="{{ addquery _page.URL "edit" "true" }}" role="button">Edit</a>

        <button type="submit" class="btn btn-sm btn-outline-secondary" name="action" value="exportWanted">
          Export
        </button>
      </form>
    </div>

    {{ template "project/parts_list" . }}
  </div>

  <div class="col-md-3">
    {{ template "project/stats" . }}
    {{ template "project/kits" . }}
    {{ template "project/events" . }}
  </div>

</div>
