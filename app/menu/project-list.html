
<h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted">
  <span>Models</span>
  <a class="d-flex align-items-center text-muted" href="/create" aria-label="Add new model">
    {{ template "icons/plus-circle" }}
  </a>
</h6>

<ul class="nav flex-column">
  {{ range .AllModels }}
  <li class="nav-item">
    <a class="nav-link {{ if active "/project/" . }}active{{end}}" href="/project/{{ . }}">
      {{ template "icons/hexagon" }}
      {{ . }}
    </a>
  </li>
  {{ end}}
</ul>
