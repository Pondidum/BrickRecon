<div class="kits">
  <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3">
    <h3>Stats</h3>
  </div>
  Parts Completion:
  <div class="progress">
    <div
      class="progress-bar bg-success"
      role="progressbar"
      style="width: {{ .Project.Stats.PercentComplete }}%"
      aria-valuenow="25"
      aria-valuemin="0"
      aria-valuemax="100">
        {{ .Project.Stats.TotalPartsInventory }} / {{ .Project.Stats.TotalPartsQuantity }}
    </div>
  </div>

</div>
