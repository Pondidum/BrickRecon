<!DOCTYPE html>
<html>
  <head>
    <title>Brick Recon</title>

    <link href="/static/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
    <link href="/static/css/custom.css" rel="stylesheet">
    <script src="/static/js/turbolinks.js"></script>
    <script src="/static/js/formhelper.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
      <a class="navbar-brand col-md-3 col-lg-2 mr-0 px-3" href="/">Brick Recon</a>

      <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-toggle="collapse" data-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <input class="form-control form-control-dark w-100" type="text" placeholder="Search" aria-label="Search">

      <ul class="navbar-nav px-3">
        {{ if _user.Authenticated }}
        <li class="nav-item text-nowrap">
          <a class="nav-link" href="#">{{ template "icons/user" }} {{_user.Name}}</a>
        </li>

        <li class="nav-item text-nowrap">
          <a class="nav-link" href="http://log:out@{{_site.URL}}">Sign out</a>
        </li>
        {{else}}
        <li class="nav-item text-nowrap">
          <a class="nav-link" href="/login">Login</a>
        </li>
        {{end}}

      </ul>

    </nav>

    <div class="container-fluid">
      <div class="row">

        {{ template "menu" . }}

        <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-md-4">

          {{ template "content" . }}

        </main>

      </div>
    </div>

  </body>
</html>
